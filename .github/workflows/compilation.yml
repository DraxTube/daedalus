name: 🎮 Build DaedalusX64 PSP — Fixed

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-psp:
    name: Build PSP (tutte le patch)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout sorgente
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🩹 Fix submodules rotti
        run: |
          if [ -f .gitmodules ]; then
            python3 -c "
          import re
          with open('.gitmodules', 'r') as f:
              content = f.read()
          content = re.sub(r'\[submodule \"SaveStates\"\][^\[]*', '', content, flags=re.DOTALL)
          with open('.gitmodules', 'w') as f:
              f.write(content)
          "
          fi
          git submodule sync 2>/dev/null || true
          git submodule update --init --depth=1 2>/dev/null || true

      - name: 🩹 Applica patch PSP
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess

          def read(f):
              with open(f, encoding='utf-8', errors='ignore') as fp:
                  return fp.read()
          def write(f, c):
              with open(f, 'w', encoding='utf-8') as fp:
                  fp.write(c)

          main_psp = 'Source/SysPSP/main.cpp'
          if not os.path.exists(main_psp):
              print("❌ main.cpp PSP non trovato!")
              exit(1)

          c = read(main_psp)
          original = c

          # ─── Patch 1: RIPRISTINA PSP_MODULE_INFO a user mode (0x0) ───
          # 0x1000 = kernel mode → CRASH su ARK/PRO/LME
          # 0x0    = user mode → CORRETTO
          c = re.sub(
              r'(PSP_MODULE_INFO\s*\([^,]+,\s*)0x1000(\s*,)',
              r'\g<1>0x0\2',
              c
          )
          # Per sicurezza, assicura che sia 0 e non altro valore strano  
          match = re.search(r'PSP_MODULE_INFO[^\n]+', c)
          print(f"PSP_MODULE_INFO: {match.group() if match else 'non trovato'}")

          # ─── Patch 2: Heap massimo per 64MB ──────────────────────────
          # PSP_HEAP_SIZE_MAX() dice al kernel di dare TUTTA la RAM disponibile
          # È diverso da PSP_MODULE_INFO e funziona in user mode
          if 'PSP_HEAP_SIZE_MAX' not in c and 'PSP_HEAP_SIZE_KB' not in c:
              # Aggiunge dopo PSP_MODULE_INFO
              c = re.sub(
                  r'(PSP_MODULE_INFO[^\n]+\n)',
                  r'\1PSP_HEAP_SIZE_MAX();\n',
                  c
              )
              print("✅ PSP_HEAP_SIZE_MAX aggiunto")
          else:
              # Sostituisce heap fisso con massimo
              c = re.sub(r'PSP_HEAP_SIZE_KB\(\d+\)', 'PSP_HEAP_SIZE_MAX()', c)
              print("ℹ️  Heap già configurato, aggiornato a MAX")

          # ─── Patch 3: Overclock 333MHz ────────────────────────────────
          c = re.sub(r'scePowerSetClockFrequency\(\s*\d+', 'scePowerSetClockFrequency(333', c)
          c = re.sub(r'scePowerSetBusClockFrequency\(\s*\d+', 'scePowerSetBusClockFrequency(166', c)
          print("✅ Overclock 333MHz")

          # ─── Patch 4: Home button ─────────────────────────────────────
          if 'PSP_SetupCallbacks' not in c:
              home_code = '''
          // ── PSP Home Button (auto-patch) ────────────────
          #include <pspkernel.h>
          static int _psp_exit_cb(int, int, void*) { sceKernelExitGame(); return 0; }
          static int _psp_cb_thread(SceSize, void*) {
              int id = sceKernelCreateCallback("Exit Callback", _psp_exit_cb, NULL);
              sceKernelRegisterExitCallback(id);
              sceKernelSleepThreadCB();
              return 0;
          }
          static void PSP_SetupCallbacks() {
              int t = sceKernelCreateThread("cb_thread", _psp_cb_thread,
                                            0x11, 0xFA0, PSP_THREAD_ATTR_USER, 0);
              if (t >= 0) sceKernelStartThread(t, 0, 0);
          }
          // ── Fine Home Button ─────────────────────────────
          '''
              c = re.sub(r'((?:#include[^\n]*\n)+)', r'\1' + home_code, c, count=1)
              c = re.sub(
                  r'(int\s+main\s*\([^)]*\)\s*\{)',
                  r'\1\n    PSP_SetupCallbacks();',
                  c
              )
              print("✅ Home button patch")

          # ─── Patch 5: VFPU per il thread principale ───────────────────
          c = c.replace(
              'PSP_MAIN_THREAD_ATTR(0)',
              'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER | THREAD_ATTR_VFPU)'
          ).replace(
              'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER)',
              'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER | THREAD_ATTR_VFPU)'
          )

          write(main_psp, c)

          # ─── Verifica finale ──────────────────────────────────────────
          print("\n=== VERIFICA PATCH ===")
          c_final = read(main_psp)
          mi = re.search(r'PSP_MODULE_INFO[^\n]+', c_final)
          heap = re.search(r'PSP_HEAP[^\n]+', c_final)
          clock = re.search(r'scePowerSetClockFrequency[^\n]+', c_final)
          print(f"MODULE_INFO : {mi.group() if mi else '❌'}")
          print(f"HEAP        : {heap.group() if heap else '❌'}")
          print(f"CLOCK       : {clock.group() if clock else '❌'}")
          print(f"HOME BTN    : {'✅' if 'registerExitCallback' in c_final else '❌'}")
          print(f"VFPU        : {'✅' if 'THREAD_ATTR_VFPU' in c_final else '❌'}")
          print("\n✅ Done!")
          PYEOF

      - name: 🔧 Installa PSPDEV toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3 git build-essential wget

          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz -O /tmp/pspdev.tar.gz
          sudo tar -xzf /tmp/pspdev.tar.gz -C /usr/local/

          PSPGCC=$(find / -name "psp-gcc" -type f 2>/dev/null | head -1)
          PSPDEV_BIN=$(dirname "$PSPGCC")
          PSPDEV_ROOT=$(dirname "$PSPDEV_BIN")
          echo "PSPDEV=$PSPDEV_ROOT" >> $GITHUB_ENV
          echo "$PSPDEV_BIN" >> $GITHUB_PATH
          export PATH="$PSPDEV_BIN:$PATH"
          psp-gcc --version

      - name: ⚙️ Configura CMake
        run: |
          TOOLCHAIN=$(find $PSPDEV -name "pspdev.cmake" 2>/dev/null | head -1)
          [ -z "$TOOLCHAIN" ] && TOOLCHAIN=$(find $PSPDEV -name "*.cmake" | head -1)

          mkdir -p build_psp
          cd build_psp
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_PSP=ON \
            -DPSP_LARGE_MEMORY=ON \
            -G Ninja \
            -DCMAKE_C_FLAGS="-O2 -G0" \
            -DCMAKE_CXX_FLAGS="-O2 -G0"

      - name: 🔨 Compila
        run: |
          cd build_psp
          ninja -j$(nproc) 2>&1 | tail -80

      - name: 📦 Pacchetta
        run: |
          mkdir -p artifact
          find build_psp -name "EBOOT.PBP" -exec cp {} artifact/ \; || true
          find build_psp -name "*.prx" -exec cp {} artifact/ \; || true
          cp -r Data artifact/ 2>/dev/null || true
          echo "=== Artifact ==="
          ls -lah artifact/

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaedalusX64-PSP-Fixed-${{ github.sha }}
          path: artifact/
          retention-days: 30

      - name: 🚀 Release automatica
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            ## 🎮 DaedalusX64 PSP — Build #${{ github.run_number }}
            - ✅ 64MB RAM (PSP_HEAP_SIZE_MAX, user mode)
            - ✅ CPU 333MHz
            - ✅ VFPU abilitato
            - ✅ Home button
            **Commit:** ${{ github.sha }}
          files: artifact/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
