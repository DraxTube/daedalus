name: 🎮 Build DaedalusX64 PSP

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-psp-slim:
    name: Build PSP 2000/3000 (64MB)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout sorgente
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🩹 Fix submodules rotti
        run: |
          if [ -f .gitmodules ]; then
            python3 -c "
          import re
          with open('.gitmodules', 'r') as f:
              content = f.read()
          content = re.sub(r'\[submodule \"SaveStates\"\][^\[]*', '', content, flags=re.DOTALL)
          with open('.gitmodules', 'w') as f:
              f.write(content)
          "
          fi
          git submodule sync 2>/dev/null || true
          git submodule update --init --depth=1 2>/dev/null || true

      # ── PATCH: Home button + exception handler + audio safe ──
      - name: 🩹 Applica patch PSP
        run: |
          # Trova il file main PSP
          MAIN_FILE=$(find Source -name "*.cpp" | xargs grep -l "sceKernelSleep\|SDL_main\|PSP_MODULE_INFO" 2>/dev/null | head -1)
          echo "File main trovato: $MAIN_FILE"
          
          if [ -z "$MAIN_FILE" ]; then
            echo "⚠️ Main PSP non trovato, cerco in tutta la Source/"
            find Source -name "*.cpp" | head -20
          fi

          # Patch 1: Aggiunge Home button callback se non presente
          if [ -n "$MAIN_FILE" ] && ! grep -q "registerExitCallback\|exitCallback" "$MAIN_FILE"; then
            echo "✅ Aggiungendo Home button callback a $MAIN_FILE"
            # Prepend il codice di callback
            python3 - "$MAIN_FILE" << 'PYEOF'
          import sys
          fname = sys.argv[1]
          with open(fname, 'r') as f:
              content = f.read()

          patch = '''
          // ── PSP Home Button & Exit Handler (patch automatica) ──
          #ifdef PSP
          #include <pspkernel.h>
          #include <pspdebug.h>
          static int _exitCallback(int, int, void*) { sceKernelExitGame(); return 0; }
          static int _callbackThread(SceSize, void*) {
              int cbid = sceKernelCreateCallback("Exit Callback", _exitCallback, NULL);
              sceKernelRegisterExitCallback(cbid);
              sceKernelSleepThreadCB();
              return 0;
          }
          static void PSP_SetupCallbacks() {
              int thid = sceKernelCreateThread("cb_thread", _callbackThread, 0x11, 0xFA0, 0, 0);
              if (thid >= 0) sceKernelStartThread(thid, 0, 0);
          }
          #endif
          // ── Fine patch ──

          '''
          # Inserisce dopo gli include esistenti
          import re
          content = re.sub(r'(#include[^\n]*\n)(?!#include)', r'\1' + patch, content, count=1)
          with open(fname, 'w') as f:
              f.write(content)
          print(f"Patch applicata a {fname}")
          PYEOF
          fi

          # Patch 2: Disabilita audio problematico cercando la config audio
          AUDIO_CONFIG=$(find Source -name "*.cpp" -o -name "*.h" | xargs grep -l "AudioEnabled\|AUDIO_ENABLED\|EnableAudio" 2>/dev/null | head -1)
          echo "Config audio trovata: $AUDIO_CONFIG"

          # Stampa struttura per debug
          echo "=== Struttura Source/ ==="
          find Source -maxdepth 3 -type d

      - name: 🔧 Installa PSPDEV toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3 git build-essential wget

          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz -O /tmp/pspdev.tar.gz
          sudo tar -xzf /tmp/pspdev.tar.gz -C /usr/local/

          PSPGCC=$(find / -name "psp-gcc" -type f 2>/dev/null | head -1)
          PSPDEV_BIN=$(dirname "$PSPGCC")
          PSPDEV_ROOT=$(dirname "$PSPDEV_BIN")
          echo "PSPDEV=$PSPDEV_ROOT" >> $GITHUB_ENV
          echo "$PSPDEV_BIN" >> $GITHUB_PATH
          export PATH="$PSPDEV_BIN:$PATH"
          psp-gcc --version

      - name: ⚙️ Configura CMake — PSP 64MB, audio safe
        run: |
          TOOLCHAIN=$(find $PSPDEV -name "pspdev.cmake" 2>/dev/null | head -1)
          [ -z "$TOOLCHAIN" ] && TOOLCHAIN=$(find $PSPDEV -name "*.cmake" | head -1)

          mkdir -p build_slim
          cd build_slim
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_PSP=ON \
            -DPSP_LARGE_MEMORY=ON \
            -G Ninja \
            -DCMAKE_C_FLAGS="-O2 -G0 -DPSP_SLIM -DAUDIO_PLUGIN_HLE=0" \
            -DCMAKE_CXX_FLAGS="-O2 -G0 -DPSP_SLIM -DAUDIO_PLUGIN_HLE=0"

      - name: 🔨 Compila
        run: |
          cd build_slim
          ninja -j$(nproc)

      - name: 📦 Pacchetta
        run: |
          mkdir -p artifact
          find build_slim -name "EBOOT.PBP" -exec cp {} artifact/ \; || true
          find build_slim -name "*.prx" -exec cp {} artifact/ \; || true
          cp -r Data artifact/ 2>/dev/null || true
          echo "=== Artifact ==="
          ls -lah artifact/

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaedalusX64-PSP-Slim-${{ github.sha }}
          path: artifact/
          retention-days: 30

      - name: 🚀 Release automatica
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} — PSP 2000/3000"
          body: |
            ## 🎮 DaedalusX64 PSP — Build #${{ github.run_number }}
            ⚠️ **PSP 2000/3000 richiesta** (64MB RAM)
            🔇 Audio HLE disabilitato (fix crash Rayman 2 e altri)
            🏠 Home button fix incluso

            ### Installazione:
            1. `EBOOT.PBP` → `PSP/GAME/DaedalusX64/`
            2. `Data/` → stessa cartella
            3. ROM in `Data/Roms/`

            **Commit:** ${{ github.sha }}
          files: artifact/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
