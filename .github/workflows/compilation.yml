name: 🎮 Build DaedalusX64 PSP

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ─── Build per PSP 2000/3000 (64MB RAM) ───
  build-psp-slim:
    name: Build PSP 2000/3000 (64MB)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout sorgente
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🩹 Fix submodules rotti
        run: |
          if [ -f .gitmodules ]; then
            python3 -c "
          import re
          with open('.gitmodules', 'r') as f:
              content = f.read()
          content = re.sub(r'\[submodule \"SaveStates\"\][^\[]*', '', content, flags=re.DOTALL)
          with open('.gitmodules', 'w') as f:
              f.write(content)
          "
          fi
          git submodule sync 2>/dev/null || true
          git submodule update --init --depth=1 2>/dev/null || true

      - name: 🔧 Installa PSPDEV toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3 git build-essential wget

          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz -O /tmp/pspdev.tar.gz
          sudo tar -xzf /tmp/pspdev.tar.gz -C /usr/local/

          PSPGCC=$(find / -name "psp-gcc" -type f 2>/dev/null | head -1)
          PSPDEV_BIN=$(dirname "$PSPGCC")
          PSPDEV_ROOT=$(dirname "$PSPDEV_BIN")

          echo "PSPDEV=$PSPDEV_ROOT" >> $GITHUB_ENV
          echo "$PSPDEV_BIN" >> $GITHUB_PATH
          export PATH="$PSPDEV_BIN:$PATH"
          psp-gcc --version

      - name: ⚙️ Configura CMake — PSP 2000/3000 64MB
        run: |
          TOOLCHAIN=$(find $PSPDEV -name "pspdev.cmake" 2>/dev/null | head -1)
          [ -z "$TOOLCHAIN" ] && TOOLCHAIN=$(find $PSPDEV -name "*.cmake" | head -1)
          echo "Toolchain: $TOOLCHAIN"

          mkdir -p build_slim
          cd build_slim
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_PSP=ON \
            -DPSP_LARGE_MEMORY=ON \
            -G Ninja \
            -DCMAKE_C_FLAGS="-O2 -G0 -DPSP_SLIM" \
            -DCMAKE_CXX_FLAGS="-O2 -G0 -DPSP_SLIM"

      - name: 🔨 Compila
        run: |
          cd build_slim
          ninja -j$(nproc)

      - name: 📦 Pacchetta — PSP 2000/3000
        run: |
          mkdir -p artifact_slim
          find build_slim -name "EBOOT.PBP" -exec cp {} artifact_slim/ \; || true
          find build_slim -name "*.prx" -exec cp {} artifact_slim/ \; || true
          cp -r Data artifact_slim/ 2>/dev/null || true

          # Crea README per ricordare che è solo per Slim
          cat > artifact_slim/LEGGIMI.txt << 'EOF'
          ╔══════════════════════════════════════╗
          ║   DaedalusX64 — PSP 2000 / 3000     ║
          ║   NON funziona su PSP 1000 (Fat)    ║
          ╚══════════════════════════════════════╝

          INSTALLAZIONE:
          1. Copia EBOOT.PBP in: PSP/GAME/DaedalusX64/
          2. Copia la cartella Data/ nella stessa directory
          3. Metti le ROM .z64/.n64/.v64 in: PSP/GAME/DaedalusX64/Data/Roms/
          4. Avvia dalla XMB

          CFW supportati: ARK, PRO-C, LME, Infinity
          EOF

          echo "=== Contenuto artifact ==="
          ls -lah artifact_slim/

      - name: ⬆️ Upload artifact PSP Slim
        uses: actions/upload-artifact@v4
        with:
          name: DaedalusX64-PSP-Slim-${{ github.sha }}
          path: artifact_slim/
          retention-days: 30

      - name: 🚀 Release automatica
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} — PSP 2000/3000"
          body: |
            ## 🎮 DaedalusX64 PSP — Build per PSP 2000 / 3000

            ⚠️ **Richiede PSP 2000 o superiore** (64MB RAM)
            ✅ Testato con CFW ARK, PRO-C, LME, Infinity

            ### Installazione:
            1. Copia `EBOOT.PBP` in `PSP/GAME/DaedalusX64/`
            2. Copia la cartella `Data/` nella stessa directory
            3. ROM in `PSP/GAME/DaedalusX64/Data/Roms/`
            4. Avvia dalla XMB

            **Commit:** ${{ github.sha }}
            **Cambiamenti:** ${{ github.event.head_commit.message }}
          files: artifact_slim/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
