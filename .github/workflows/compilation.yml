name: 🎮 Build DaedalusX64 PSP

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # permette di avviare manualmente dalla UI di GitHub

jobs:
  build-psp:
    name: Build per PSP
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice sorgente
      - name: 📥 Checkout sorgente
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Installa PSPDEV usando i binari precompilati ufficiali
      - name: 🔧 Installa PSPDEV toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build python3 git \
            build-essential wget

          export PSPDEV=/usr/local/pspdev
          echo "PSPDEV=$PSPDEV" >> $GITHUB_ENV
          echo "$PSPDEV/bin" >> $GITHUB_PATH

          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz
          sudo tar -xzf pspdev-ubuntu-latest-x86_64.tar.gz -C /usr/local/

          echo "✅ PSPDEV installato"
          psp-gcc --version

      # 3. Configura il progetto con CMake per PSP
      - name: ⚙️ Configura CMake per PSP
        run: |
          mkdir -p build_psp
          cd build_psp
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$PSPDEV/psp/share/pspdev.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_PSP=ON \
            -G Ninja

      # 5. Compila!
      - name: 🔨 Compila
        run: |
          cd build_psp
          ninja -j$(nproc)

      # 6. Prepara il pacchetto finale (.pbp per PSP)
      - name: 📦 Pacchetta EBOOT.PBP
        run: |
          mkdir -p artifact
          # Copia l'eseguibile finale
          find build_psp -name "EBOOT.PBP" -exec cp {} artifact/ \;
          find build_psp -name "*.prx" -exec cp {} artifact/ \; || true
          # Copia le risorse necessarie
          cp -r Data artifact/ 2>/dev/null || true
          echo "=== Contenuto artifact ==="
          ls -lah artifact/

      # 7. Carica la build come artifact scaricabile
      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaedalusX64-PSP-${{ github.sha }}
          path: artifact/
          retention-days: 30

      # 8. Se è un push su master, crea anche una Release automatica
      - name: 🚀 Crea Release automatica
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            ## 🎮 DaedalusX64 PSP - Build Automatica

            **Commit:** ${{ github.sha }}
            **Data:** ${{ github.event.head_commit.timestamp }}

            ### Come installare:
            1. Copia `EBOOT.PBP` in `PSP/GAME/DaedalusX64/`
            2. Copia la cartella `Data/` nella stessa directory
            3. Avvia dalla XMB della PSP

            ### Cambiamenti:
            ${{ github.event.head_commit.message }}
          files: artifact/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
