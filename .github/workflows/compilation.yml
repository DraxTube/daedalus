name: 🎮 Build DaedalusX64 PSP — Fixed

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-psp:
    name: Build PSP (tutte le patch)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout sorgente
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🩹 Fix submodules rotti
        run: |
          if [ -f .gitmodules ]; then
            python3 -c "
          import re
          with open('.gitmodules', 'r') as f:
              content = f.read()
          content = re.sub(r'\[submodule \"SaveStates\"\][^\[]*', '', content, flags=re.DOTALL)
          with open('.gitmodules', 'w') as f:
              f.write(content)
          "
          fi
          git submodule sync 2>/dev/null || true
          git submodule update --init --depth=1 2>/dev/null || true

      - name: 🩹 Applica tutte le patch PSP
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess

          # Legge file ignorando encoding non-UTF8
          def read(f):
              with open(f, encoding='utf-8', errors='ignore') as fp:
                  return fp.read()
          def write(f, c):
              with open(f, 'w', encoding='utf-8') as fp:
                  fp.write(c)

          # ─── Patch 1: PSP_LARGE_MEMORY (64MB) ────────────────────────
          # Il main PSP ha: PSP_MODULE_INFO( DaedalusX64 1.1.9a, 0, 1, 1 )
          # L'attr 0 deve diventare 0x1000 per abilitare i 64MB
          files = subprocess.getoutput("grep -rl 'PSP_MODULE_INFO' Source/").splitlines()
          for f in files:
              c = read(f)
              # Regex più permissiva: il nome può avere spazi, numeri, punti
              c2 = re.sub(
                  r'(PSP_MODULE_INFO\s*\(\s*[^,]+,\s*)(0x[0-9a-fA-F]+|0)(\s*,)',
                  lambda m: m.group(1) + hex(int(m.group(2), 16) | 0x1000) + m.group(3),
                  c
              )
              if c2 != c:
                  write(f, c2)
                  print(f"✅ LARGE_MEMORY patch → {f}")
              else:
                  match = re.search(r'PSP_MODULE_INFO[^\n]+', c)
                  print(f"ℹ️  Già ok: {match.group() if match else f}")

          # ─── Patch 2: VFPU sul main thread ───────────────────────────
          files2 = subprocess.getoutput("grep -rl 'PSP_MAIN_THREAD' Source/").splitlines()
          for f in files2:
              c = read(f)
              c2 = c.replace(
                  'PSP_MAIN_THREAD_ATTR(0)',
                  'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER | THREAD_ATTR_VFPU)'
              ).replace(
                  'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER)',
                  'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER | THREAD_ATTR_VFPU)'
              )
              if c2 != c:
                  write(f, c2)
                  print(f"✅ VFPU patch → {f}")

          # ─── Patch 3: Home button + Exit callback ─────────────────────
          main_psp = 'Source/SysPSP/main.cpp'
          if os.path.exists(main_psp):
              c = read(main_psp)
              if 'registerExitCallback' not in c and '_psp_exit_cb' not in c:
                  home_code = '''
          // ── PSP Home Button (auto-patch) ────────────────────────────
          #ifdef __PSP__
          #include <pspkernel.h>
          static int _psp_exit_cb(int, int, void*) { sceKernelExitGame(); return 0; }
          static int _psp_cb_thread(SceSize, void*) {
              int id = sceKernelCreateCallback("Exit Callback", _psp_exit_cb, NULL);
              sceKernelRegisterExitCallback(id);
              sceKernelSleepThreadCB();
              return 0;
          }
          static void PSP_SetupCallbacks() {
              int t = sceKernelCreateThread("cb_thread", _psp_cb_thread, 0x11, 0xFA0, PSP_THREAD_ATTR_USER, 0);
              if (t >= 0) sceKernelStartThread(t, 0, 0);
          }
          #else
          static void PSP_SetupCallbacks() {}
          #endif
          // ── Fine Home Button patch ───────────────────────────────────
          '''
                  # Inserisce dopo il primo blocco di include
                  c2 = re.sub(r'((?:#include[^\n]*\n)+)', r'\1' + home_code, c, count=1)
                  # Chiama all'inizio del main()
                  c2 = re.sub(
                      r'(int\s+main\s*\([^)]*\)\s*\{)',
                      r'\1\n    PSP_SetupCallbacks();',
                      c2
                  )
                  write(main_psp, c2)
                  print(f"✅ Home button patch → {main_psp}")
              else:
                  print(f"ℹ️  Home button già presente in {main_psp}")

          # ─── Patch 4: Overclock 333MHz ────────────────────────────────
          result = subprocess.getoutput("grep -rl 'scePowerSetClockFrequency' Source/")
          for f in result.splitlines():
              c = read(f)
              c2 = c
              c2 = re.sub(r'scePowerSetClockFrequency\(\s*\d+', 'scePowerSetClockFrequency(333', c2)
              c2 = re.sub(r'scePowerSetBusClockFrequency\(\s*\d+', 'scePowerSetBusClockFrequency(166', c2)
              if c2 != c:
                  write(f, c2)
                  print(f"✅ Overclock 333MHz patch → {f}")

          # ─── Patch 5: Stack size 4MB ──────────────────────────────────
          result2 = subprocess.getoutput("grep -rl 'PSP_MAIN_THREAD_STACK_SIZE_KB' Source/")
          for f in result2.splitlines():
              c = read(f)
              c2 = re.sub(r'PSP_MAIN_THREAD_STACK_SIZE_KB\(\d+\)', 'PSP_MAIN_THREAD_STACK_SIZE_KB(4096)', c)
              if c2 != c:
                  write(f, c2)
                  print(f"✅ Stack 4MB patch → {f}")

          # ─── Verifica finale ──────────────────────────────────────────
          print("\n=== VERIFICA PATCH ===")
          main_content = read('Source/SysPSP/main.cpp')
          mi = re.search(r'PSP_MODULE_INFO[^\n]+', main_content)
          print(f"PSP_MODULE_INFO: {mi.group() if mi else 'NON TROVATO'}")
          print(f"Home button: {'✅ presente' if 'registerExitCallback' in main_content else '❌ mancante'}")
          print(f"SetupCallbacks: {'✅ presente' if 'PSP_SetupCallbacks' in main_content else '❌ mancante'}")
          
          clock_content = subprocess.getoutput("grep -r 'scePowerSetClockFrequency' Source/")
          print(f"Clock: {clock_content[:200] if clock_content else 'non trovato'}")
          print("\n✅ Patch completate!")
          PYEOF

      - name: 🔧 Installa PSPDEV toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3 git build-essential wget

          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz -O /tmp/pspdev.tar.gz
          sudo tar -xzf /tmp/pspdev.tar.gz -C /usr/local/

          PSPGCC=$(find / -name "psp-gcc" -type f 2>/dev/null | head -1)
          PSPDEV_BIN=$(dirname "$PSPGCC")
          PSPDEV_ROOT=$(dirname "$PSPDEV_BIN")
          echo "PSPDEV=$PSPDEV_ROOT" >> $GITHUB_ENV
          echo "$PSPDEV_BIN" >> $GITHUB_PATH
          export PATH="$PSPDEV_BIN:$PATH"
          psp-gcc --version

      - name: ⚙️ Configura CMake
        run: |
          TOOLCHAIN=$(find $PSPDEV -name "pspdev.cmake" 2>/dev/null | head -1)
          [ -z "$TOOLCHAIN" ] && TOOLCHAIN=$(find $PSPDEV -name "*.cmake" | head -1)
          echo "Toolchain: $TOOLCHAIN"

          mkdir -p build_psp
          cd build_psp
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_PSP=ON \
            -DPSP_LARGE_MEMORY=ON \
            -G Ninja \
            -DCMAKE_C_FLAGS="-O2 -G0 -DPSP_SLIM -DPSP_FW_VERSION=660" \
            -DCMAKE_CXX_FLAGS="-O2 -G0 -DPSP_SLIM -DPSP_FW_VERSION=660"

      - name: 🔨 Compila
        run: |
          cd build_psp
          ninja -j$(nproc) 2>&1 | tail -80

      - name: 📦 Pacchetta
        run: |
          mkdir -p artifact
          find build_psp -name "EBOOT.PBP" -exec cp {} artifact/ \; || true
          find build_psp -name "*.prx" -exec cp {} artifact/ \; || true
          cp -r Data artifact/ 2>/dev/null || true
          echo "=== Artifact ==="
          ls -lah artifact/

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaedalusX64-PSP-Fixed-${{ github.sha }}
          path: artifact/
          retention-days: 30

      - name: 🚀 Release automatica
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} — tutte le patch"
          body: |
            ## 🎮 DaedalusX64 PSP — Build #${{ github.run_number }}
            - ✅ 64MB RAM (PSP_LARGE_MEMORY)
            - ✅ CPU 333MHz overclock
            - ✅ VFPU abilitato
            - ✅ Home button fix
            - ✅ Stack 4MB

            ### Installazione:
            1. `EBOOT.PBP` → `PSP/GAME/DaedalusX64/`
            2. `Data/` → stessa cartella
            3. ROM in `Data/Roms/`

            **Commit:** ${{ github.sha }}
          files: artifact/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
