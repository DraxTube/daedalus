name: 🎮 Build DaedalusX64 PSP — Fixed

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-psp:
    name: Build PSP (tutte le patch)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout sorgente
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🩹 Fix submodules rotti
        run: |
          if [ -f .gitmodules ]; then
            python3 -c "
          import re
          with open('.gitmodules', 'r') as f:
              content = f.read()
          content = re.sub(r'\[submodule \"SaveStates\"\][^\[]*', '', content, flags=re.DOTALL)
          with open('.gitmodules', 'w') as f:
              f.write(content)
          "
          fi
          git submodule sync 2>/dev/null || true
          git submodule update --init --depth=1 2>/dev/null || true

      - name: 🔍 Analisi struttura sorgente
        run: |
          echo "=== STRUTTURA SOURCE ==="
          find Source -type f -name "*.cpp" -o -name "*.h" | sort
          echo ""
          echo "=== FILE CON PSP_MODULE_INFO ==="
          grep -rl "PSP_MODULE_INFO" Source/ 2>/dev/null || echo "non trovato"
          echo ""
          echo "=== FILE CON sceKernel ==="
          grep -rl "sceKernel" Source/ 2>/dev/null | head -10 || echo "non trovato"
          echo ""
          echo "=== FILE CON main( ==="
          grep -rln "int main(" Source/ 2>/dev/null || echo "non trovato"
          echo ""
          echo "=== CMAKE FILES ==="
          find . -name "CMakeLists.txt" | head -10
          echo ""
          echo "=== CONTENUTO CMakeLists.txt ROOT ==="
          cat CMakeLists.txt 2>/dev/null || echo "non trovato"

      - name: 🩹 Applica tutte le patch
        run: |
          python3 << 'PYEOF'
          import os, re, glob, subprocess

          def read(f):
              with open(f) as fp: return fp.read()
          def write(f, c):
              with open(f, 'w') as fp: fp.write(c)

          # ─── Patch 1: PSP_LARGE_MEMORY ───────────────────────────────
          # Senza questo la PSP 2000/3000 usa solo 32MB → crash garantito
          files = subprocess.getoutput("grep -rl 'PSP_MODULE_INFO' Source/").splitlines()
          for f in files:
              c = read(f)
              # PSP_MODULE_INFO(name, attr, major, minor) → attr deve avere 0x1000 per large memory
              if 'PSP_MODULE_INFO' in c:
                  # Sostituisce attr 0 o 0x0 con 0x1000 (KERNEL) o aggiunge se mancante
                  c2 = re.sub(
                      r'PSP_MODULE_INFO\s*\(\s*(\w+)\s*,\s*(0x[0-9a-fA-F]+|0)\s*,',
                      lambda m: f'PSP_MODULE_INFO({m.group(1)}, {hex(int(m.group(2),16) | 0x1000)},',
                      c
                  )
                  if c2 != c:
                      write(f, c2)
                      print(f"✅ Patch PSP_LARGE_MEMORY applicata a {f}")
                  else:
                      print(f"ℹ️ PSP_MODULE_INFO già ok in {f}: {re.search(r'PSP_MODULE_INFO[^\n]+', c).group()}")

          # ─── Patch 2: PSP_MAIN_THREAD_ATTR con SCE_KERNEL_TH_USE_VFPU ─
          files2 = subprocess.getoutput("grep -rl 'PSP_MAIN_THREAD' Source/").splitlines()
          for f in files2:
              c = read(f)
              # Assicura che il thread principale usi VFPU (necessario per la FPU N64)
              if 'PSP_MAIN_THREAD_ATTR(0)' in c or 'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER)' in c:
                  c2 = c.replace(
                      'PSP_MAIN_THREAD_ATTR(0)',
                      'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER | THREAD_ATTR_VFPU)'
                  ).replace(
                      'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER)',
                      'PSP_MAIN_THREAD_ATTR(THREAD_ATTR_USER | THREAD_ATTR_VFPU)'
                  )
                  if c2 != c:
                      write(f, c2)
                      print(f"✅ Patch VFPU applicata a {f}")

          # ─── Patch 3: Home button + Exit callback ─────────────────────
          # Cerca il file main PSP
          candidates = subprocess.getoutput("grep -rl 'sceKernelSleep\\|SDL_main\\|PSP_MODULE_INFO' Source/").splitlines()
          main_file = candidates[0] if candidates else None
          
          if main_file:
              c = read(main_file)
              if 'registerExitCallback' not in c and '_exitCallback' not in c:
                  home_patch = '''
          // ── PSP Home Button patch (auto-applicata) ──────────────────
          #ifdef __PSP__
          #include <pspkernel.h>
          static int _psp_exit_cb(int, int, void*) { sceKernelExitGame(); return 0; }
          static int _psp_cb_thread(SceSize, void*) {
              int id = sceKernelCreateCallback("Exit Callback", _psp_exit_cb, NULL);
              sceKernelRegisterExitCallback(id);
              sceKernelSleepThreadCB();
              return 0;
          }
          void PSP_SetupCallbacks(void) {
              int t = sceKernelCreateThread("cb_thread", _psp_cb_thread, 0x11, 0xFA0, PSP_THREAD_ATTR_USER, 0);
              if (t >= 0) sceKernelStartThread(t, 0, 0);
          }
          #else
          void PSP_SetupCallbacks(void) {}
          #endif
          // ── Fine home button patch ───────────────────────────────────

          '''
                  # Inserisce dopo tutti gli include
                  c2 = re.sub(r'((?:#include[^\n]*\n)+)', r'\1' + home_patch, c, count=1)
                  
                  # Chiama SetupCallbacks all'inizio del main
                  c2 = re.sub(
                      r'(int\s+main\s*\([^)]*\)\s*\{)',
                      r'\1\n    PSP_SetupCallbacks();',
                      c2
                  )
                  write(main_file, c2)
                  print(f"✅ Patch Home button applicata a {main_file}")

          # ─── Patch 4: Overclock a 333MHz ─────────────────────────────
          # Cerca dove viene impostata la frequenza CPU
          clock_files = subprocess.getoutput("grep -rl 'scePowerSetClockFrequency\\|SetClockFrequency\\|222\\|266' Source/").splitlines()
          for f in clock_files:
              c = read(f)
              changed = False
              # 222MHz → 333MHz
              if 'scePowerSetClockFrequency(222' in c:
                  c = c.replace('scePowerSetClockFrequency(222', 'scePowerSetClockFrequency(333')
                  changed = True
              if 'scePowerSetClockFrequency(266' in c:
                  c = c.replace('scePowerSetClockFrequency(266', 'scePowerSetClockFrequency(333')
                  changed = True
              # Bus a 166 (metà del clock CPU = ottimale)  
              if 'scePowerSetBusClockFrequency(111' in c:
                  c = c.replace('scePowerSetBusClockFrequency(111', 'scePowerSetBusClockFrequency(166')
                  changed = True
              if changed:
                  write(f, c)
                  print(f"✅ Patch overclock 333MHz applicata a {f}")

          # ─── Patch 5: Stack size più grande per il main thread ────────
          stack_files = subprocess.getoutput("grep -rl 'PSP_MAIN_THREAD_STACK_SIZE_KB' Source/").splitlines()
          for f in stack_files:
              c = read(f)
              # Aumenta lo stack (default spesso 512KB, meglio 4MB)
              c2 = re.sub(r'PSP_MAIN_THREAD_STACK_SIZE_KB\(\d+\)', 'PSP_MAIN_THREAD_STACK_SIZE_KB(4096)', c)
              if c2 != c:
                  write(f, c2)
                  print(f"✅ Patch stack size applicata a {f}")

          print("\n✅ Tutte le patch applicate!")
          PYEOF

      - name: 🔧 Installa PSPDEV toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3 git build-essential wget

          wget -q https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz -O /tmp/pspdev.tar.gz
          sudo tar -xzf /tmp/pspdev.tar.gz -C /usr/local/

          PSPGCC=$(find / -name "psp-gcc" -type f 2>/dev/null | head -1)
          PSPDEV_BIN=$(dirname "$PSPGCC")
          PSPDEV_ROOT=$(dirname "$PSPDEV_BIN")
          echo "PSPDEV=$PSPDEV_ROOT" >> $GITHUB_ENV
          echo "$PSPDEV_BIN" >> $GITHUB_PATH
          export PATH="$PSPDEV_BIN:$PATH"
          psp-gcc --version

      - name: ⚙️ Configura CMake
        run: |
          TOOLCHAIN=$(find $PSPDEV -name "pspdev.cmake" 2>/dev/null | head -1)
          [ -z "$TOOLCHAIN" ] && TOOLCHAIN=$(find $PSPDEV -name "*.cmake" | head -1)
          echo "Toolchain: $TOOLCHAIN"

          mkdir -p build_psp
          cd build_psp
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_PSP=ON \
            -DPSP_LARGE_MEMORY=ON \
            -G Ninja \
            -DCMAKE_C_FLAGS="-O2 -G0 -DPSP_SLIM -DPSP_FW_VERSION=660" \
            -DCMAKE_CXX_FLAGS="-O2 -G0 -DPSP_SLIM -DPSP_FW_VERSION=660"

      - name: 🔨 Compila
        run: |
          cd build_psp
          ninja -j$(nproc) 2>&1 | tail -50

      - name: 📦 Pacchetta
        run: |
          mkdir -p artifact
          find build_psp -name "EBOOT.PBP" -exec cp {} artifact/ \; || true
          find build_psp -name "*.prx" -exec cp {} artifact/ \; || true
          cp -r Data artifact/ 2>/dev/null || true
          
          cat > artifact/INSTALLA.txt << 'EOF'
          ╔══════════════════════════════════════════╗
          ║     DaedalusX64 — PSP 2000 / 3000       ║
          ╠══════════════════════════════════════════╣
          ║  INSTALLAZIONE:                          ║
          ║  1. Crea cartella: PSP/GAME/Daedalus/   ║
          ║  2. Copia EBOOT.PBP dentro               ║
          ║  3. Copia cartella Data/ dentro          ║
          ║  4. ROM in Data/Roms/ (.z64/.n64/.v64)  ║
          ║  5. Avvia da XMB                         ║
          ╠══════════════════════════════════════════╣
          ║  PATCH APPLICATE:                        ║
          ║  ✅ 64MB RAM abilitati                   ║
          ║  ✅ CPU overclock 333MHz                 ║
          ║  ✅ VFPU abilitato                       ║
          ║  ✅ Home button fix                      ║
          ║  ✅ Stack size aumentato                 ║
          ╚══════════════════════════════════════════╝
          EOF
          
          echo "=== Artifact finale ==="
          ls -lah artifact/

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaedalusX64-PSP-Fixed-${{ github.sha }}
          path: artifact/
          retention-days: 30

      - name: 🚀 Release automatica
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} — tutte le patch"
          body: |
            ## 🎮 DaedalusX64 PSP — Build #${{ github.run_number }}

            ### Patch applicate:
            - ✅ **64MB RAM** — PSP_LARGE_MEMORY abilitato
            - ✅ **333MHz CPU** — overclock massimo PSP
            - ✅ **VFPU** — unità floating point abilitata
            - ✅ **Home button** — torna al XMB senza spegnere
            - ✅ **Stack 4MB** — previene stack overflow

            ### Installazione:
            1. `EBOOT.PBP` → `PSP/GAME/DaedalusX64/`
            2. `Data/` → stessa cartella
            3. ROM `.z64/.n64/.v64` → `Data/Roms/`

            **Commit:** ${{ github.sha }}
          files: artifact/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
